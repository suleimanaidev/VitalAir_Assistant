<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VitalAir Assistant API</title>
  <style>
    :root {
      --bg: #0b0f14;
      --surface: #121820;
      --border: #1e2a38;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --primary: #22c55e;
      --primary-dim: #16a34a;
      --glow: rgba(34, 197, 94, 0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, var(--glow), transparent),
        radial-gradient(ellipse 50% 40% at 100% 100%, rgba(34, 197, 94, 0.08), transparent);
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
    }
    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.25rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-dim));
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .version {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--primary);
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.3);
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }
    .tagline {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 2rem;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--primary);
      color: #052e16;
      font-weight: 600;
      font-size: 1rem;
      padding: 0.85rem 1.75rem;
      border-radius: 0.75rem;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      box-shadow: 0 4px 20px var(--glow);
    }
    .cta:hover {
      background: #4ade80;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px var(--glow);
    }
    .links {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }
    .links a {
      color: var(--muted);
      font-size: 0.8rem;
      text-decoration: none;
      padding: 0.35rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      transition: color 0.15s, border-color 0.15s;
    }
    .links a:hover {
      color: var(--primary);
      border-color: rgba(34, 197, 94, 0.4);
    }
    .city {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo" aria-hidden="true">🌫️</div>
    <h1>VitalAir Assistant API</h1>
    <span class="version">v2.0</span>
    <p class="tagline">
      Lahore smog safety — AQI monitoring, health profiles, AI agents &amp; live routes.
    </p>
    <a href="/docs" class="cta">
      Open Swagger UI →
    </a>
    <div class="links">
      <a href="/api/health">Health check</a>
      <a href="/api/aqi?city=Lahore">Live AQI</a>
      <a href="/redoc">ReDoc</a>
    </div>
    <p class="city">Serving Lahore, Pakistan</p>
  </div>
</body>
</html>
